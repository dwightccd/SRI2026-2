<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SASP – Quiz Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --bg2: #080f1e;
    --panel: #0a1628;
    --panel2: #0d1c35;
    --border: #1a3a5c;
    --cyan: #00d4ff;
    --cyan2: #00a8cc;
    --purple: #7b2fff;
    --green: #00ff88;
    --red: #ff3366;
    --text: #c8e6ff;
    --text2: #6a9cc8;
    --text3: #3a6080;
    --glow-cyan: 0 0 20px rgba(0,212,255,0.35);
    --glow-purple: 0 0 20px rgba(123,47,255,0.35);
    --glow-green: 0 0 20px rgba(0,255,136,0.35);
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: radial-gradient(circle at top, #0a1426 0%, var(--bg) 45%);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 28px 0 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .header-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--cyan);
    letter-spacing: 4px;
    text-transform: uppercase;
    border: 1px solid var(--cyan);
    padding: 5px 14px;
    margin-bottom: 12px;
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(0,212,255,0.18);
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.9rem, 5vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 0.86rem;
    color: var(--text2);
    letter-spacing: 1.5px;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1 1 300px;
    min-width: 240px;
  }

  .search-input {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(10, 22, 40, 0.9);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 14px;
    outline: none;
    font-family: inherit;
  }

  .search-input:focus {
    border-color: var(--cyan);
    box-shadow: var(--glow-cyan);
  }

  .helper-text {
    color: var(--text3);
    font-size: 0.72rem;
  }

  #screen-modules { display: block; }
  #screen-quiz    { display: none; }
  #screen-results { display: none; }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .module-card {
    background: linear-gradient(180deg, rgba(13,28,53,0.95), rgba(10,22,40,0.95));
    border: 1px solid var(--border);
    padding: 22px 20px;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    min-height: 148px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .module-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: var(--cyan);
  }

  .module-card:hover {
    border-color: var(--cyan);
    box-shadow: var(--glow-cyan);
    transform: translateY(-2px);
  }

  .module-card.all-mode::before { background: var(--purple); }
  .module-card.all-mode:hover {
    border-color: var(--purple);
    box-shadow: var(--glow-purple);
  }

  .module-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    color: var(--cyan);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .module-card.all-mode .module-num { color: var(--purple); }

  .module-title {
    font-size: 0.92rem;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 10px;
  }

  .module-count {
    font-size: 0.74rem;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
  }

  .quiz-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 18px;
    align-items: start;
  }

  .main-col, .side-col {
    min-width: 0;
  }

  .quiz-panel, .side-panel, .question-card, .review-item {
    background: linear-gradient(180deg, rgba(13,28,53,0.96), rgba(10,22,40,0.96));
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .quiz-panel, .side-panel {
    padding: 18px;
  }

  .side-panel h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.82rem;
    color: var(--cyan);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .mini-stat {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(26,58,92,0.65);
    font-size: 0.8rem;
  }

  .mini-stat:last-child { border-bottom: 0; }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .quiz-module-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.74rem;
    color: var(--cyan);
    letter-spacing: 2px;
  }

  .quiz-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.84rem;
    color: var(--text2);
  }

  .quiz-score span { color: var(--green); font-weight: bold; }

  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: var(--panel2);
    border-radius: 999px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    transition: width 0.35s ease;
    box-shadow: var(--glow-cyan);
  }

  .question-card {
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
  }

  .question-card::after {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--purple), transparent);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .question-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.73rem;
    color: var(--text3);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .question-text {
    font-size: 1rem;
    line-height: 1.65;
    font-weight: 600;
  }

  .options-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .option-btn {
    background: rgba(13,28,53,0.95);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    line-height: 1.5;
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-radius: 14px;
    touch-action: manipulation;
  }

  .option-letter {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--cyan);
    min-width: 18px;
    padding-top: 2px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--cyan);
    background: rgba(0,212,255,0.06);
    box-shadow: var(--glow-cyan);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    box-shadow: var(--glow-green);
  }

  .option-btn.correct .option-letter { color: var(--green); }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(255,51,102,0.08);
  }

  .option-btn.wrong .option-letter { color: var(--red); }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    padding: 14px 16px;
    border: 1px solid;
    font-size: 0.84rem;
    line-height: 1.55;
    margin-bottom: 14px;
    display: none;
    border-radius: 14px;
  }

  .feedback-box.show { display: block; }
  .feedback-box.ok { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.06); }
  .feedback-box.fail { border-color: var(--red); color: var(--text); background: rgba(255,51,102,0.06); }
  .feedback-box.fail strong { color: var(--cyan); }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 18px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    border-radius: 14px;
    min-height: 46px;
    touch-action: manipulation;
  }

  .btn-primary { border-color: var(--cyan); color: var(--cyan); }
  .btn-primary:hover { background: var(--cyan); color: var(--bg); box-shadow: var(--glow-cyan); }
  .btn-secondary { border-color: var(--purple); color: var(--purple); }
  .btn-secondary:hover { background: var(--purple); color: #fff; box-shadow: var(--glow-purple); }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: default; }

  .quiz-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .results-header {
    text-align: center;
    padding: 24px 0 18px;
  }

  .results-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.55rem;
    font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .results-title.pass { color: var(--green); text-shadow: var(--glow-green); }
  .results-title.fail { color: var(--red); }

  .score-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.3rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 10px 0;
  }

  .score-sub {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text2);
    font-size: 0.85rem;
    margin-bottom: 18px;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 26px;
  }

  .stat-item { text-align: center; }
  .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.45rem;
    font-weight: 700;
  }

  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red); }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 2px;
  }

  .review-section { margin-top: 16px; }

  .review-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    color: var(--red);
    letter-spacing: 3px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .review-item {
    padding: 16px;
    margin-bottom: 10px;
    border-left: 3px solid var(--red);
  }

  .review-q {
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .review-wrong {
    font-size: 0.78rem;
    color: var(--red);
    margin-bottom: 4px;
  }

  .review-correct {
    font-size: 0.78rem;
    color: var(--green);
  }

  .results-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 22px;
    margin-bottom: 36px;
  }

  @media (max-width: 1024px) {
    .modules-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .quiz-shell { grid-template-columns: 1fr; }
    .side-col { order: -1; }
  }

  @media (max-width: 720px) {
    .container { padding: 14px; }
    .modules-grid { grid-template-columns: 1fr; }
    .question-card, .quiz-panel, .side-panel { padding: 16px; }
    .quiz-header, .toolbar { flex-direction: column; align-items: stretch; }
    .quiz-actions, .results-actions { flex-direction: column; }
    .btn { width: 100%; }
    .question-text { font-size: 0.96rem; }
    .option-btn { font-size: 0.84rem; padding: 13px 14px; }
    .score-display { font-size: 2.8rem; }
    .header h1 { letter-spacing: 2px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { scroll-behavior: auto !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-badge">Sistema de Autoevaluación</div>
    <h1>SASP</h1>
    <p>Sostenibilidad Aplicada al Sector Productivo</p>
  </div>

  <div id="screen-modules">
    <div class="toolbar">
      <div class="search-wrap">
        <input id="module-search" class="search-input" type="text" placeholder="Buscar módulo...">
      </div>
      <div class="helper-text" id="module-summary"></div>
    </div>
    <div class="modules-grid" id="modules-grid"></div>
  </div>

  <div id="screen-quiz">
    <div class="quiz-shell">
      <div class="main-col">
        <div class="quiz-panel">
          <div class="quiz-header">
            <div class="quiz-module-label" id="quiz-module-label">MÓDULO 1</div>
            <div class="quiz-score">Aciertos: <span id="score-live">0</span> / <span id="total-live">0</span></div>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="question-card">
            <div class="question-num" id="question-num">Pregunta 1 de 30</div>
            <div class="question-text" id="question-text"></div>
          </div>
          <ul class="options-list" id="options-list"></ul>
          <div class="feedback-box" id="feedback-box"></div>
          <div class="quiz-actions">
            <button class="btn btn-primary" id="btn-next" disabled>Siguiente →</button>
            <button class="btn btn-danger" onclick="goHome()">Abandonar</button>
          </div>
        </div>
      </div>
      <div class="side-col">
        <div class="side-panel">
          <h3>Panel rápido</h3>
          <div class="mini-stat"><span>Modo</span><strong id="quick-mode">Módulo</strong></div>
          <div class="mini-stat"><span>Preguntas</span><strong id="quick-total">0</strong></div>
          <div class="mini-stat"><span>Actual</span><strong id="quick-current">0</strong></div>
          <div class="mini-stat"><span>Fallos</span><strong id="quick-wrong">0</strong></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-results">
    <div class="results-header">
      <div class="results-title" id="results-title">COMPLETADO</div>
      <div class="score-display" id="score-pct">0%</div>
      <div class="score-sub" id="score-sub">0 correctas de 0 preguntas</div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val green" id="stat-correct">0</div>
          <div class="stat-label">CORRECTAS</div>
        </div>
        <div class="stat-item">
          <div class="stat-val red" id="stat-wrong">0</div>
          <div class="stat-label">INCORRECTAS</div>
        </div>
      </div>
    </div>
    <div class="review-section" id="review-section"></div>
    <div class="results-actions">
      <button class="btn btn-primary" id="btn-retry" onclick="retryModule()">↺ Repetir</button>
      <button class="btn btn-secondary" id="btn-only-wrong" onclick="retryWrongOnly()" style="display:none;">⚠ Solo fallos</button>
      <button class="btn btn-secondary" onclick="goHome()">⌂ Inicio</button>
    </div>
  </div>
</div>

<script>
const modules = [
  {
    id: 'sasp01',
    title: 'SASP01 – Economía Circular I',
    questions: [
      { q: '¿A qué sistemas emulan los modelos regenerativos?', opts: ['A los sistemas periféricos','A los sistemas autóctonos','A los sistemas artificiales','A los sistemas naturales'], ans: 3 },
      { q: '¿Cuál de las siguientes acciones promueve la economía circular?', opts: ['Todas las respuestas son correctas','Compartir y alquilar productos cuando sea posible','Comprar productos de un solo uso en grandes cantidades','Tirar los productos viejos sin reciclarlos'], ans: 1 },
      { q: '¿Cuál es el número total de Objetivos de Desarrollo Sostenible?', opts: ['15','17','16','18'], ans: 1 },
      { q: '¿Cuál es una estrategia importante para implementar la economía circular en la gestión de residuos?', opts: ['Todas las respuestas son correctas','Reciclar solo los materiales más valiosos','Separar y reciclar una amplia gama de materiales','Incinerar todos los residuos para generar energía'], ans: 2 },
      { q: '¿Cuál es uno de los desafíos más importantes para la implementación de la economía circular?', opts: ['Aumentar la demanda de productos desechables','Fomentar una disminución en el impuesto de sociedades','Ignorar por completo los problemas ambientales','Cambiar la mentalidad y los hábitos de consumo de la sociedad'], ans: 3 },
      { q: '¿Cuál es uno de los principios clave de la economía circular?', opts: ['Disminuir la eficiencia en el uso de recursos','Mantener los productos y materiales en uso durante el mayor tiempo posible','Ninguna de las respuestas anteriores es correcta','Eliminar por completo la producción de bienes'], ans: 1 },
      { q: '¿Cuántos eran los ODM?', opts: ['12','20','17','8'], ans: 3 },
      { q: '¿Dónde se celebró la COP21 sobre el Cambio Climático?', opts: ['Estocolmo','París','Nueva York','Kioto'], ans: 1 },
      { q: '¿En qué año fue aprobado el Protocolo de Kioto?', opts: ['2007','1977','1987','1997'], ans: 3 },
      { q: '¿En qué año la Asamblea General de la ONU adoptó los ODM?', opts: ['2000','1995','1990'], ans: 0 },
      { q: '¿En qué año se celebró la Cumbre de la Tierra de Río de Janeiro?', opts: ['1992','2012','1982','2002'], ans: 0 },
      { q: '¿Los residuos de qué tipo de plástico transforma la empresa vasca Eko-Rec?', opts: ['Polietileno de alta densidad','PET','Polipropileno','PVC'], ans: 1 },
      { q: '¿Qué es la "economía de compartir" en relación con la economía circular?', opts: ['Un sistema que prohíbe compartir recursos','Un enfoque económico que fomenta la propiedad individual de todos los bienes','Compartir bienes y servicios con otros para reducir la demanda de nuevos recursos','Las respuestas A y B son correctas'], ans: 2 },
      { q: '¿Qué es la economía circular?', opts: ['Un enfoque que busca minimizar los residuos y mantener los recursos en uso','Todas las respuestas son correctas','Un sistema que prioriza la extracción de recursos naturales','Un sistema económico basado en el crecimiento ilimitado'], ans: 0 },
      { q: '¿Qué es la regeneración en el contexto de la economía circular?', opts: ['Destruir por completo los recursos naturales','Restaurar y revitalizar los recursos naturales y los ecosistemas','Extracción selectiva de materias primas en países subdesarrollados','Ignorar por completo los problemas ambientales'], ans: 1 },
      { q: '¿Qué objetivo persigue la reutilización en la economía circular?', opts: ['Reducir la durabilidad de los productos','Mantener el nivel de consumo','Aumentar la producción de residuos','Maximizar el ciclo de vida de los productos y materiales'], ans: 3 },
      { q: '¿Qué papel desempeña la innovación en la economía circular?', opts: ['Fomentar la producción sin cambios','Desarrollar nuevas tecnologías y enfoques para mejorar la sostenibilidad','Todas las respuestas son correctas','Minimizar la inversión en investigación y desarrollo'], ans: 1 },
      { q: '“Es aquel desarrollo que satisface las necesidades actuales de las personas sin comprometer la capacidad de generaciones futuras para satisfacer las suyas”, hablamos de:', opts: ['Desarrollo sostenible','Desarrollo supeditable','Desarrollo sustentable','Desarrollo sostenido'], ans: 0 },
      { q: 'El ciclo por el que los materiales biodegradables se devuelven a la tierra a través de procesos procesos como el compostaje para ayudar a regenerar la tierra recibe el nombre de:', opts: ['Ciclo bioclimático','Ciclo biodinámico','Ciclo técnico','Ciclo biológico'], ans: 3 },
      { q: 'El flujo continuo de materiales en una economía circular se representa mediante qué tipo de diagrama', opts: ['Diagrama de flujo','Diagrama de Gantt','Diagrama matricial','Diagrama de mariposa'], ans: 3 },
      { q: 'En este tipo de economía no existe la idea del retorno, hablamos de:', opts: ['Todas las respuestas son correctas','Economía regenerativa','Economía circular','Economía lineal'], ans: 3 },
      { q: 'En un sistema de economía circular se priman:', opts: ['Todas las respuestas son correctas','El reparar y vender','La reutilización y reciclaje','El usar y tirar'], ans: 2 },
      { q: 'Hay varias formas para mantener los productos y materiales en circulación a través de dos tipos de ciclos, que son:', opts: ['Ciclo biológico y ciclo administrativo','Ciclo técnico y ciclo biológico','Ciclo biodegradable y ciclo permanente','Ninguna de las respuestas anteriores es correcta'], ans: 1 },

      { q: '¿Sin qué no hay economía circular?', opts: ['Sin gestión circular.','Ninguna de las otras respuestas es correcta.','Sin diseño circular.','Sin negocio circular.'], ans: 2 },
      { q: 'El diseño de productos y servicios debe estar pensado desde el principio para facilitar su:', opts: ['Reutilización.','Todas las respuestas son correctas.','Reparación.','Reciclaje.'], ans: 1 },
      { q: 'El ecodiseño es...', opts: ['Pensar en qué contenedor habría que tirar lo productos.','Pensar qué se puede hacer con las cosas antes de fabricarlas.','Pensar cómo fabricar los productos para que se puedan reciclar.','Todas las respuestas son correctas.'], ans: 1 },
      { q: 'Es una herramienta para evaluar el impacto ambiental de un producto o servicio a lo largo de su vida.', opts: ['EC.','AV.','ACV.','AASHTO.'], ans: 2 },
      { q: 'La variable ambiental como un criterio para las decisiones del proceso de diseño es:', opts: ['Ecodiseño.','Ninguna de las otras respuestas es correcta.','Diseño inteligente.','Ecoproducción industrial.'], ans: 0 },
      { q: 'Las empresas B Corp trabajan en los cinco continentes desde:', opts: ['2011.','2007.','2009.','2005.'], ans: 1 },
      { q: 'Las Sociedades de Beneficio e Interés Común (SBIC) han sido reconocidas en nuestro país por la ley 18/2022 de creación y crecimiento de empresas, conocida como:', opts: ['Ley SBIC-22.','Ley crea y crece.','Ley de emprendedores.','Todas las repuestas son correctas.'], ans: 1 },
      { q: 'Los objetivos de la economía circular son...', opts: ['Ninguna de las otras respuestas es correcta.','Aumentar la entrada de materiales y aumentar los desechos.','Reducir la entrada de materiales y aumentar los desechos.','Reducir la entrada de los materiales y la producción de desechos.'], ans: 3 },
      { q: 'Se debe evitar el diseño de productos...', opts: ['Con bajo consumo hídrico.','Diseñados siguiendo el ecodiseño.','De materiales reciclables.','Con obsolescencia programada.'], ans: 3 },
      { q: 'Un producto con menor peso supone...', opts: ['La búsqueda de maquinaria moderna.','Una menor cantidad de residuos.','La reducción del uso del agua.','La optimización de energía utilizada.'], ans: 1 }
    ]
  }
];

for (const mod of modules) {
  const seen = new Set();
  mod.questions = mod.questions.filter(q => {
    const key = JSON.stringify([q.q, q.opts, q.ans]);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

let currentModule = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongAnswers = [];
let answered = false;
let lastMode = 'module';

window.addEventListener('DOMContentLoaded', () => {
  buildModuleGrid();
  setupSearch();
});

function setupSearch() {
  const input = document.getElementById('module-search');
  input.addEventListener('input', () => buildModuleGrid(input.value.trim().toLowerCase()));
}

function buildModuleGrid(filter = '') {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  const filteredModules = modules.filter(mod =>
    !filter || mod.title.toLowerCase().includes(filter) || mod.id.toLowerCase().includes(filter)
  );

  filteredModules.forEach((mod, i) => {
    const realIndex = modules.findIndex(m => m.id === mod.id);
    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="module-num">MÓDULO ${String(realIndex + 1).padStart(2, '0')}</div>
      <div class="module-title">${mod.title}</div>
      <div class="module-count">${mod.questions.length} preguntas</div>
    `;
    card.onclick = () => startQuiz(realIndex);
    grid.appendChild(card);
  });

  const total = modules.reduce((s, m) => s + m.questions.length, 0);
  if (!filter || 'modo total todos los módulos mezclados'.includes(filter)) {
    const allCard = document.createElement('div');
    allCard.className = 'module-card all-mode';
    allCard.innerHTML = `
      <div class="module-num">⚡ MODO TOTAL</div>
      <div class="module-title">Todos los módulos mezclados</div>
      <div class="module-count">${total} preguntas</div>
    `;
    allCard.onclick = () => startQuiz(-1);
    grid.appendChild(allCard);
  }

  document.getElementById('module-summary').textContent = `${filteredModules.length} módulos visibles · ${total} preguntas en total`;
}

function normalizeQuestion(q) {
  return { q: q.q, opts: [...q.opts], ans: q.ans };
}

function updateQuickPanel() {
  document.getElementById('quick-mode').textContent = lastMode === 'wrong' ? 'Solo fallos' : (currentModule?.id === 'all' ? 'Total' : 'Módulo');
  document.getElementById('quick-total').textContent = currentQuestions.length;
  document.getElementById('quick-current').textContent = `${Math.min(currentIndex + 1, currentQuestions.length)}/${currentQuestions.length}`;
  document.getElementById('quick-wrong').textContent = wrongAnswers.length;
}

function startQuiz(modIndex) {
  lastMode = 'module';

  if (modIndex === -1) {
    currentModule = { id: 'all', title: 'Todos los módulos' };
    currentQuestions = modules.flatMap(m => m.questions.map(normalizeQuestion));
  } else {
    currentModule = modules[modIndex];
    currentQuestions = currentModule.questions.map(normalizeQuestion);
  }

  currentQuestions = shuffle(currentQuestions);
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  answered = false;

  document.getElementById('screen-modules').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-results').style.display = 'none';

  document.getElementById('quiz-module-label').textContent = currentModule.title;
  document.getElementById('total-live').textContent = currentQuestions.length;
  document.getElementById('score-live').textContent = '0';
  updateQuickPanel();
  renderQuestion();
}

function startWrongQuiz() {
  if (!wrongAnswers.length) return;

  lastMode = 'wrong';
  currentModule = { id: 'wrong', title: 'Repaso de fallos' };
  currentQuestions = shuffle(wrongAnswers.map(w => normalizeQuestion(w.question)));
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  answered = false;

  document.getElementById('screen-modules').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-results').style.display = 'none';

  document.getElementById('quiz-module-label').textContent = currentModule.title;
  document.getElementById('total-live').textContent = currentQuestions.length;
  document.getElementById('score-live').textContent = '0';
  updateQuickPanel();
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  answered = false;

  document.getElementById('question-num').textContent = `Pregunta ${currentIndex + 1} de ${currentQuestions.length}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = ((currentIndex / currentQuestions.length) * 100) + '%';

  const optsList = document.getElementById('options-list');
  optsList.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E'];

  const indices = q.opts.map((_, i) => i);
  const shuffledIndices = shuffle(indices);
  q._shuffled = shuffledIndices;

  shuffledIndices.forEach((origIdx, pos) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[pos]}</span><span>${q.opts[origIdx]}</span>`;
    btn.onclick = () => selectAnswer(origIdx, btn, q);
    li.appendChild(btn);
    optsList.appendChild(li);
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.textContent = '';

  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = true;
  btnNext.textContent = currentIndex === currentQuestions.length - 1 ? 'Ver resultados →' : 'Siguiente →';
  btnNext.onclick = nextQuestion;
  updateQuickPanel();
}

function selectAnswer(chosenIdx, btn, q) {
  if (answered) return;
  answered = true;

  const correct = chosenIdx === q.ans;
  const fb = document.getElementById('feedback-box');
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach(b => b.disabled = true);

  allBtns.forEach((b, pos) => {
    const origIdx = q._shuffled[pos];
    if (origIdx === q.ans) b.classList.add('correct');
  });

  if (correct) {
    btn.classList.add('correct');
    fb.className = 'feedback-box ok show';
    fb.textContent = '✓ ¡Correcto!';
    score++;
    document.getElementById('score-live').textContent = score;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback-box fail show';
    fb.innerHTML = `✗ Incorrecto. <strong>Respuesta correcta:</strong> ${q.opts[q.ans]}`;
    wrongAnswers.push({
      question: normalizeQuestion(q),
      q: q.q,
      chosen: q.opts[chosenIdx],
      correct: q.opts[q.ans]
    });
  }

  document.getElementById('btn-next').disabled = false;
  updateQuickPanel();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'block';

  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  const pass = pct >= 50;

  document.getElementById('results-title').textContent = pass ? '✓ COMPLETADO' : '✗ SIGUE PRACTICANDO';
  document.getElementById('results-title').className = 'results-title ' + (pass ? 'pass' : 'fail');
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-sub').textContent = `${score} correctas de ${total} preguntas`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;

  const onlyWrongBtn = document.getElementById('btn-only-wrong');
  onlyWrongBtn.style.display = wrongAnswers.length > 0 ? 'inline-block' : 'none';

  const rev = document.getElementById('review-section');
  if (wrongAnswers.length > 0) {
    rev.innerHTML = `<div class="review-title">▸ RESPUESTAS INCORRECTAS (${wrongAnswers.length})</div>`;
    wrongAnswers.forEach(wa => {
      rev.innerHTML += `
        <div class="review-item">
          <div class="review-q">${wa.q}</div>
          <div class="review-wrong">✗ Tu respuesta: ${wa.chosen}</div>
          <div class="review-correct">✓ Correcta: ${wa.correct}</div>
        </div>
      `;
    });
  } else {
    rev.innerHTML = '<div style="text-align:center;color:var(--green);font-family:Orbitron,sans-serif;font-size:0.85rem;letter-spacing:2px;padding:20px;">¡PERFECTO! Todas correctas 🎉</div>';
  }
}

function retryModule() {
  if (lastMode === 'wrong') return startWrongQuiz();
  if (currentModule.id === 'all') return startQuiz(-1);
  const modIndex = modules.findIndex(m => m.id === currentModule.id);
  if (modIndex >= 0) startQuiz(modIndex);
}

function retryWrongOnly() {
  startWrongQuiz();
}

function goHome() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
  document.getElementById('screen-modules').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
</script>
