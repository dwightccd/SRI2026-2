<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRI // Tests</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --bg3: #141920;
    --border: #1e2730;
    --border2: #253040;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --green: #00ff88;
    --green2: #00cc6a;
    --red: #ff4466;
    --red2: #cc2244;
    --yellow: #ffcc00;
    --yellow2: #cc9900;
    --text: #c8d8e8;
    --text2: #7a9ab5;
    --text3: #4a6a80;
    --font: 'JetBrains Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.012) 2px,
      rgba(0,212,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ═══════════════════ HEADER ═══════════════════ */
  .header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-main {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo-sep { color: var(--border2); font-size: 18px; }

  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-meta {
    text-align: right;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .header-meta span { display: block; margin-top: 3px; color: var(--text2); }

  /* ═══════════════════ MODULE SELECTOR ═══════════════════ */
  #screen-home {
    padding: 60px 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .home-title {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .home-heading {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .home-heading span { color: var(--accent); }

  .home-desc {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .module-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .module-card:hover {
    border-color: var(--accent2);
    background: var(--bg3);
    transform: translateY(-2px);
  }

  .module-card:hover::before { opacity: 1; }

  .module-id {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .module-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .module-meta {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text3);
  }

  .module-meta i { color: var(--text2); }

  .all-modules-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 4px;
    padding: 16px 24px;
    cursor: pointer;
    color: var(--accent);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    width: 100%;
    transition: all 0.2s;
  }

  .all-modules-btn:hover {
    background: rgba(0,212,255,0.07);
    border-color: var(--accent);
  }

  /* ═══════════════════ QUIZ SCREEN ═══════════════════ */
  #screen-quiz { display: none; padding: 0; }

  .quiz-topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .quiz-module-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .quiz-score-badge {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  .quiz-score-badge b { color: var(--green); }

  .btn-exit-quiz {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-exit-quiz:hover { border-color: var(--red2); color: var(--red); }

  /* ═══════════════════ QUESTION AREA ═══════════════════ */
  .question-area {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  .q-counter {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .q-type-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    border: 1px solid;
  }

  .type-single { color: var(--accent); border-color: var(--accent2); background: rgba(0,212,255,0.06); }
  .type-multi  { color: var(--yellow); border-color: var(--yellow2); background: rgba(255,204,0,0.06); }
  .type-tf     { color: var(--green);  border-color: var(--green2);  background: rgba(0,255,136,0.06); }
  .type-fill   { color: #ff88cc; border-color: #cc4488; background: rgba(255,136,204,0.06); }

  .q-text {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  /* Options */
  .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 13px;
    line-height: 1.5;
  }

  .option-item:hover:not(.disabled) {
    border-color: var(--accent2);
    background: rgba(0,212,255,0.04);
  }

  .option-item.selected {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  .option-item.correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    color: var(--green);
  }

  .option-item.incorrect {
    border-color: var(--red);
    background: rgba(255,68,102,0.08);
    color: var(--red);
    text-decoration: line-through;
    opacity: 0.8;
  }

  .option-item.show-correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.05);
    color: var(--green);
  }

  .option-item.disabled { cursor: default; }

  .option-letter {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    min-width: 18px;
    padding-top: 1px;
    letter-spacing: 1px;
  }

  .option-item.correct .option-letter,
  .option-item.show-correct .option-letter { color: var(--green); }
  .option-item.incorrect .option-letter { color: var(--red); }
  .option-item.selected .option-letter { color: var(--accent); }

  /* Fill in the blank */
  .fill-wrap { display: flex; flex-direction: column; gap: 12px; }

  .fill-input {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    max-width: 480px;
  }

  .fill-input:focus { border-color: var(--accent2); }
  .fill-input.correct { border-color: var(--green); color: var(--green); }
  .fill-input.incorrect { border-color: var(--red); color: var(--red); }

  /* Feedback */
  .feedback-box {
    margin-top: 24px;
    padding: 16px 20px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    border-left: 3px solid;
  }

  .feedback-box.correct-fb {
    background: rgba(0,255,136,0.06);
    border-color: var(--green);
    color: var(--green2);
  }

  .feedback-box.incorrect-fb {
    background: rgba(255,68,102,0.06);
    border-color: var(--red);
    color: #ff8899;
  }

  .feedback-label {
    font-size: 10px;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .feedback-box.correct-fb .feedback-label { color: var(--green); }
  .feedback-box.incorrect-fb .feedback-label { color: var(--red); }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.3; cursor: default; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  /* ═══════════════════ RESULTS SCREEN ═══════════════════ */
  #screen-results {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .results-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .results-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .results-score-big {
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-score-big.grade-a { color: var(--green); }
  .results-score-big.grade-b { color: var(--accent); }
  .results-score-big.grade-c { color: var(--yellow); }
  .results-score-big.grade-d { color: var(--red); }

  .results-module-name {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    text-align: center;
  }

  .stat-val {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* Incorrect review */
  .review-section { margin-bottom: 40px; }

  .review-title {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,68,102,0.2);
  }

  .review-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red2);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 10px;
  }

  .review-q {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .review-answer-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    font-size: 12px;
  }

  .review-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    min-width: 80px;
  }

  .review-your { color: var(--red); }
  .review-correct { color: var(--green); }

  .results-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ═══════════════════ RESPONSIVE ═══════════════════ */
  @media (max-width: 600px) {
    .header { padding: 20px; }
    .header-meta { display: none; }
    #screen-home { padding: 40px 20px; }
    .question-area { padding: 32px 20px; }
    #screen-results { padding: 40px 20px; }
    .quiz-topbar { padding: 12px 20px; }
    .results-stats { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .results-score-big { font-size: 52px; }
  }
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="header">
  <div class="logo">
    <span class="logo-main">SRI</span>
    <span class="logo-sep">//</span>
    <span class="logo-sub">Tests de autoevaluación</span>
  </div>
  <div class="header-meta">
    Servicios en Red
    <span id="hdr-info">Selecciona un módulo</span>
  </div>
</header>

<!-- ═══════════ HOME SCREEN ═══════════ -->
<div id="screen-home">
  <p class="home-title">Autoevaluación</p>
  <h1 class="home-heading">Servicios en <span>Red</span></h1>
  <p class="home-desc">// Selecciona un módulo para comenzar el test aleatorio</p>

  <div class="modules-grid" id="modules-grid"></div>

  <button class="all-modules-btn" onclick="startQuiz('ALL')">
    ▶ &nbsp; Todos los módulos — test global
  </button>
</div>

<!-- ═══════════ QUIZ SCREEN ═══════════ -->
<div id="screen-quiz">
  <div class="quiz-topbar">
    <span class="quiz-module-label" id="quiz-module-label">—</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <span class="quiz-score-badge" id="quiz-score-badge">0 / 0</span>
    <button class="btn-exit-quiz" onclick="exitQuiz()">✕ Salir</button>
  </div>

  <div class="question-area">
    <p class="q-counter" id="q-counter">Pregunta 1 de 10</p>
    <span class="q-type-badge" id="q-type-badge"></span>
    <p class="q-text" id="q-text"></p>

    <ul class="options-list" id="options-list"></ul>

    <div class="fill-wrap" id="fill-wrap" style="display:none">
      <input type="text" class="fill-input" id="fill-input" placeholder="Escribe tu respuesta..." autocomplete="off" />
    </div>

    <div class="feedback-box" id="feedback-box">
      <span class="feedback-label" id="feedback-label"></span>
      <span id="feedback-text"></span>
    </div>

    <div class="action-row">
      <button class="btn-primary" id="btn-confirm" onclick="confirmAnswer()">Confirmar</button>
      <button class="btn-primary" id="btn-next" onclick="nextQuestion()" style="display:none">Siguiente →</button>
      <button class="btn-secondary" id="btn-skip" onclick="skipQuestion()">Omitir</button>
    </div>
  </div>
</div>

<!-- ═══════════ RESULTS SCREEN ═══════════ -->
<div id="screen-results">
  <div class="results-header">
    <p class="results-label">Resultado final</p>
    <div class="results-score-big" id="res-score-big">—</div>
    <p class="results-module-name" id="res-module-name">—</p>
  </div>

  <div class="results-stats">
    <div class="stat-box">
      <div class="stat-val" id="res-correct">0</div>
      <div class="stat-lbl">Correctas</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="res-incorrect" style="color:var(--red)">0</div>
      <div class="stat-lbl">Incorrectas</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="res-total">0</div>
      <div class="stat-lbl">Total</div>
    </div>
  </div>

  <div class="review-section" id="review-section"></div>

  <div class="results-actions">
    <button class="btn-primary" id="btn-repeat" onclick="repeatQuiz()">↺ &nbsp;Repetir módulo</button>
    <button class="btn-primary" id="btn-review-incorrect" onclick="retryIncorrect()" style="display:none">⟳ &nbsp;Repasar incorrectas</button>
    <button class="btn-secondary" onclick="goHome()">← &nbsp;Módulos</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  BANCO DE PREGUNTAS — SRI
// ═══════════════════════════════════════════════════════
const MODULES = [
  {
    "id": "SRI01",
    "name": "DHCP — Servicio de configuración dinámica",
    "questions": [
      {
        "type": "single",
        "text": "Cuando un cliente DHCP solicita la renovación de una concesión DHCP, el primer mensaje que envía es:",
        "options": [
          "DHCP_DISCOVER",
          "DHCP_REQUEST",
          "DHCP_RELEASE",
          "DHCP_OFFER"
        ],
        "correct": [
          1
        ],
        "explanation": "Respuesta correcta: DHCP_REQUEST"
      },
      {
        "type": "single",
        "text": "En el archivo de configuración dhcpd.conf se realiza una reserva de una IP para un ordenador concreto mediante una declaración:",
        "options": [
          "host",
          "option hostname",
          "fixed-address",
          "shared-network"
        ],
        "correct": [
          0
        ],
        "explanation": "Respuesta correcta: host"
      },
      {
        "type": "single",
        "text": "En sistemas debían/Ubuntu se puede solicitar la renovación de una concesión DHCP con el comando:",
        "options": [
          "ifconfig /renew",
          "ipconfig /renew",
          "dhclient",
          "ifconfig /release"
        ],
        "correct": [
          2
        ],
        "explanation": "Respuesta correcta: dhclient"
      },
      {
        "type": "single",
        "text": "Para especificar en el archivo de configuración dhcpd.conf las IP de los servidores DNS que se enviarán a los clientes DHCP, se utiliza la directiva:",
        "options": [
          "option dns-servers",
          "option domain-name",
          "option domain-name-servers",
          "option ip-dns-servers"
        ],
        "correct": [
          1
        ],
        "explanation": "Respuesta correcta: option domain-name-servers"
      },
      {
        "type": "single",
        "text": "Un cliente DHCP envía un mensaje DHCP para buscar en la red algún servidor DHCP que le pueda ofrecer una concesión DHCP, el mensaje que envía se llama _____.",
        "options": [
          "DHCP_DISCOVER",
          "DHCPDISCOVER"
        ],
        "correct": [
          0
        ],
        "explanation": "Respuesta correcta: DHCP_DISCOVER"
      },
      {
        "type": "fill",
        "text": "Cuando a un ordenador servidor DHCP integrado en un dominio controlado por u controlador de dominio Windows Server le está permitido asignar parámetros de red, se dice que el servidor DHCP es un servidor de red .",
        "correct": [
          "autorizado"
        ],
        "explanation": "Respuesta correcta: autorizado"
      },
      {
        "type": "single",
        "text": "Para detener el servicio DHCP en sistemas Debian/Ubuntu se debe ejecutar el comando:",
        "options": [
          "sudo /etc/init.d/dhcp3-server stop",
          "/etc/init.d/dhcp3-server",
          "sudo service dns-server start",
          "service dhcp3-server stop"
        ],
        "correct": [
          0
        ],
        "explanation": "Respuesta correcta: sudo /etc/init.d/dhcp3-server stop"
      },
      {
        "type": "tf",
        "text": "En una red hay dos servidores DHCP asignando dinámicamente los mismos rangos de direcciones IP y el resto de ordenadores son clientes DHCP. Aunque los dos servidores asignen el mismo conjunto de direcciones, nunca se producirán conflictos de IP en la red. ¿Verdadero o Falso?",
        "options": [
          "Verdadero",
          "Falso"
        ],
        "correct": [
          1
        ],

let state = {
  moduleId: null,
  questions: [],
  current: 0,
  score: 0,
  answered: false,
  selectedOptions: [],
  results: [],
  incorrectList: [],
  retryQueue: [],
  retryDepth: 0,
  sourceLabel: ''
};

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  const grid = document.getElementById('modules-grid');
  MODULES.forEach(m => {
    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="module-id">${m.id}</div>
      <div class="module-name">${m.name}</div>
      <div class="module-meta">
        <span><i>${m.questions.length}</i> preguntas</span>
      </div>
    `;
    card.onclick = () => startQuiz(m.id);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
//  QUIZ LOGIC
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resolveModuleLabel(moduleId) {
  return moduleId === 'ALL'
    ? 'Todos los módulos'
    : moduleId + ' — ' + (MODULES.find(x => x.id === moduleId)?.name || '');
}

function startQuiz(moduleId, customQuestions = null, customLabel = null) {
  state.moduleId = moduleId;
  let qs = [];
  if (Array.isArray(customQuestions) && customQuestions.length) {
    qs = [...customQuestions];
  } else if (moduleId === 'ALL') {
    MODULES.forEach(m => qs.push(...m.questions));
  } else {
    const m = MODULES.find(x => x.id === moduleId);
    qs = m ? [...m.questions] : [];
  }

  state.questions = shuffle(qs);
  state.current = 0;
  state.score = 0;
  state.results = [];
  state.incorrectList = [];
  state.sourceLabel = customLabel || resolveModuleLabel(moduleId);

  showScreen('quiz');
  document.getElementById('quiz-module-label').textContent = state.sourceLabel;
  document.getElementById('hdr-info').textContent = state.sourceLabel;
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  const idx = state.current;

  state.answered = false;
  state.selectedOptions = [];

  // Counter & progress
  document.getElementById('q-counter').textContent = `Pregunta ${idx+1} de ${total}`;
  document.getElementById('progress-fill').style.width = `${(idx/total)*100}%`;
  document.getElementById('quiz-score-badge').innerHTML = `<b>${state.score}</b> / ${idx}`;

  // Type badge
  const badge = document.getElementById('q-type-badge');
  const typeLabels = { single:'opción única', multi:'múltiple', tf:'verdadero/falso', fill:'completar' };
  const typeClasses = { single:'type-single', multi:'type-multi', tf:'type-tf', fill:'type-fill' };
  badge.textContent = typeLabels[q.type] || q.type;
  badge.className = 'q-type-badge ' + (typeClasses[q.type]||'');

  // Question text
  document.getElementById('q-text').textContent = q.text;

  // Hide feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  // Buttons
  document.getElementById('btn-confirm').style.display = 'inline-block';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'inline-block';

  // Options vs Fill
  const optList = document.getElementById('options-list');
  const fillWrap = document.getElementById('fill-wrap');
  const fillInput = document.getElementById('fill-input');

  if (q.type === 'fill') {
    optList.style.display = 'none';
    fillWrap.style.display = 'flex';
    fillInput.value = '';
    fillInput.className = 'fill-input';
    fillInput.disabled = false;
    fillInput.focus();
    fillInput.oninput = () => {
      document.getElementById('btn-confirm').disabled = fillInput.value.trim() === '';
    };
    fillInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !document.getElementById('btn-confirm').disabled) confirmAnswer();
    };
  } else {
    optList.style.display = 'flex';
    fillWrap.style.display = 'none';
    optList.innerHTML = '';
    const letters = ['a','b','c','d','e','f','g'];
    q.options.forEach((opt, i) => {
      const li = document.createElement('li');
      li.className = 'option-item';
      li.innerHTML = `<span class="option-letter">${letters[i]}.</span><span>${opt}</span>`;
      li.onclick = () => toggleOption(i, li, q.type);
      optList.appendChild(li);
    });
  }
}

function toggleOption(idx, el, type) {
  if (state.answered) return;
  if (type === 'single' || type === 'tf') {
    document.querySelectorAll('.option-item').forEach(li => li.classList.remove('selected'));
    state.selectedOptions = [idx];
  } else {
    if (el.classList.contains('selected')) {
      el.classList.remove('selected');
      state.selectedOptions = state.selectedOptions.filter(x => x !== idx);
    } else {
      el.classList.add('selected');
      state.selectedOptions.push(idx);
    }
    document.getElementById('btn-confirm').disabled = state.selectedOptions.length === 0;
    return;
  }
  el.classList.add('selected');
  document.getElementById('btn-confirm').disabled = false;
}

function confirmAnswer() {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.current];
  let isCorrect = false;
  let userAnswerText = '';
  let correctAnswerText = '';

  if (q.type === 'fill') {
    const val = document.getElementById('fill-input').value.trim();
    userAnswerText = val;
    const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
    isCorrect = correctArr.some(c => c.toLowerCase() === val.toLowerCase());
    correctAnswerText = correctArr[0];
    const inp = document.getElementById('fill-input');
    inp.disabled = true;
    inp.className = 'fill-input ' + (isCorrect ? 'correct' : 'incorrect');
  } else {
    const items = document.querySelectorAll('.option-item');
    const sel = state.selectedOptions;
    const correct = q.correct;

    if (q.type === 'multi') {
      const selSorted = [...sel].sort().join(',');
      const corrSorted = [...correct].sort().join(',');
      isCorrect = selSorted === corrSorted;
    } else {
      isCorrect = sel.length === 1 && sel[0] === correct[0];
    }

    items.forEach((item, i) => {
      item.classList.add('disabled');
      if (correct.includes(i)) item.classList.add(sel.includes(i) ? 'correct' : 'show-correct');
      else if (sel.includes(i)) item.classList.add('incorrect');
    });

    userAnswerText = sel.map(i => q.options[i]).join(', ') || '(sin respuesta)';
    correctAnswerText = correct.map(i => q.options[i]).join(', ');
  }

  if (isCorrect) state.score++;

  state.results.push({ q, isCorrect, userAnswerText, correctAnswerText });
  if (!isCorrect) state.incorrectList.push({ q, userAnswerText, correctAnswerText });

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (isCorrect ? 'correct-fb' : 'incorrect-fb');
  document.getElementById('feedback-label').textContent = isCorrect ? '✓ Correcto' : '✗ Incorrecto';
  document.getElementById('feedback-text').textContent = q.explanation || '';

  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('btn-next').textContent = state.current < state.questions.length - 1 ? 'Siguiente →' : 'Ver resultados →';
  document.getElementById('quiz-score-badge').innerHTML = `<b>${state.score}</b> / ${state.current+1}`;
}

function skipQuestion() {
  const q = state.questions[state.current];
  state.results.push({ q, isCorrect: false, userAnswerText: '(omitida)', correctAnswerText: '' });
  state.incorrectList.push({ q, userAnswerText: '(omitida)', correctAnswerText: Array.isArray(q.correct) ? (q.type==='fill' ? q.correct[0] : q.correct.map(i=>q.options[i]).join(', ')) : q.options[q.correct[0]] });
  nextQuestion();
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════
function showResults() {
  showScreen('results');
  const total = state.questions.length;
  const correct = state.score;
  const incorrect = total - correct;
  const pct = Math.round((correct / total) * 100);

  const bigEl = document.getElementById('res-score-big');
  bigEl.textContent = pct + '%';
  bigEl.className = 'results-score-big ' + (pct>=85?'grade-a':pct>=70?'grade-b':pct>=50?'grade-c':'grade-d');

  const modName = state.sourceLabel || resolveModuleLabel(state.moduleId);
  document.getElementById('res-module-name').textContent = modName;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-incorrect').textContent = incorrect;
  document.getElementById('res-total').textContent = total;

  const reviewBtn = document.getElementById('btn-review-incorrect');
  if (state.incorrectList.length > 0) {
    reviewBtn.style.display = 'inline-block';
    reviewBtn.textContent = state.retryDepth > 0 ? '⟳ &nbsp;Seguir con falladas' : '⟳ &nbsp;Repasar incorrectas';
  } else {
    reviewBtn.style.display = 'none';
  }

  // Incorrect review
  const reviewSec = document.getElementById('review-section');
  reviewSec.innerHTML = '';
  if (state.incorrectList.length > 0) {
    reviewSec.innerHTML = `<div class="review-title">// Preguntas incorrectas — repasa estos conceptos</div>`;
    state.incorrectList.forEach(item => {
      const div = document.createElement('div');
      div.className = 'review-item';
      const corrText = item.correctAnswerText || (item.q.type==='fill' ? item.q.correct[0] : item.q.correct.map(i=>item.q.options[i]).join(', '));
      div.innerHTML = `
        <div class="review-q">${item.q.text}</div>
        <div class="review-answer-row"><span class="review-lbl">Tu respuesta:</span><span class="review-your">${item.userAnswerText}</span></div>
        <div class="review-answer-row" style="margin-top:4px"><span class="review-lbl">Correcta:</span><span class="review-correct">${corrText}</span></div>
        ${item.q.explanation ? `<div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6">${item.q.explanation}</div>` : ''}
      `;
      reviewSec.appendChild(div);
    });
  } else {
    reviewSec.innerHTML = `<div style="color:var(--green);font-size:13px;letter-spacing:2px;padding:20px 0">✓ ¡Perfecto! Todas las respuestas son correctas.</div>`;
  }

  document.getElementById('progress-fill').style.width = '100%';
}

function repeatQuiz() {
  state.retryQueue = [];
  state.retryDepth = 0;
  startQuiz(state.moduleId);
}

function retryIncorrect() {
  if (!state.incorrectList.length) return;
  const failedQuestions = state.incorrectList.map(item => item.q);
  state.retryQueue = failedQuestions;
  state.retryDepth += 1;
  const suffix = state.retryDepth === 1 ? ' — repaso de incorrectas' : ` — repaso de incorrectas (${state.retryDepth})`;
  startQuiz(state.moduleId, failedQuestions, resolveModuleLabel(state.moduleId) + suffix);
}

function exitQuiz() { goHome(); }
function goHome() {
  state.retryQueue = [];
  state.retryDepth = 0;
  state.sourceLabel = '';
  showScreen('home');
  document.getElementById('hdr-info').textContent = 'Selecciona un módulo';
  document.getElementById('progress-fill').style.width = '0%';
}

function showScreen(name) {
  document.getElementById('screen-home').style.display = name==='home' ? 'block' : 'none';
  document.getElementById('screen-quiz').style.display = name==='quiz' ? 'block' : 'none';
  document.getElementById('screen-results').style.display = name==='results' ? 'block' : 'none';
}

init();
</script>
